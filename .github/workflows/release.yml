name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the changelog commit can push back to main and
          # trigger subsequent workflows if needed. Falls back to the
          # default GITHUB_TOKEN (push succeeds but won't trigger CI).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        run: |
          # Extract the content between ## [Unreleased] and the next ## heading.
          # Write to release-notes.md so special characters (backticks, quotes)
          # are never interpolated through shell variable expansion.
          python3 - <<'EOF'
          import re, sys

          text = open("CHANGELOG.md").read()

          m = re.search(
              r'^## \[Unreleased\]\s*\n(.*?)(?=^## )',
              text, re.MULTILINE | re.DOTALL
          )
          if not m:
              print("ERROR: no [Unreleased] section found in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          body = m.group(1).strip()
          body = re.sub(r'^---\s*\n?', '', body).strip()

          if not body:
              print("ERROR: [Unreleased] section is empty", file=sys.stderr)
              sys.exit(1)

          open("release-notes.md", "w").write(body + "\n")
          EOF

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X github.com/construct-run/construct/internal/version.Version=${{ steps.version.outputs.version }} -s -w" \
            -o construct-linux-amd64 \
            ./cmd/construct/

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X github.com/construct-run/construct/internal/version.Version=${{ steps.version.outputs.version }} -s -w" \
            -o construct-linux-arm64 \
            ./cmd/construct/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            construct-linux-amd64 \
            construct-linux-arm64

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md

      - name: Update CHANGELOG.md
        run: |
          python3 - <<'EOF'
          import re, datetime

          version = "${{ steps.version.outputs.version }}"
          today = datetime.date.today().strftime("%Y-%m-%d")

          text = open("CHANGELOG.md").read()

          # Replace ## [Unreleased] with the versioned heading
          text = text.replace(
              "## [Unreleased]",
              f"## [{version}] — {today}",
              1
          )

          # Insert a fresh [Unreleased] block at the top (after the # Changelog heading)
          fresh = "\n## [Unreleased]\n\n---\n\n"
          text = re.sub(
              r'(# Changelog\s*\n)',
              r'\1' + fresh,
              text,
              count=1
          )

          open("CHANGELOG.md", "w").write(text)
          EOF

      - name: Commit changelog update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: changelog for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
