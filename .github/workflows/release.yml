name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history and the ability to push the changelog commit back.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Extract changelog and update CHANGELOG.md
        id: changelog
        run: |
          chmod +x .github/extract-changelog.sh
          bash .github/extract-changelog.sh "${{ github.ref_name }}" > /tmp/release-body.md
          # Signal whether the script produced content (non-empty body).
          if [[ -s /tmp/release-body.md ]]; then
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated CHANGELOG.md
        # Only run when the script actually rewrote the changelog.
        if: steps.changelog.outputs.has_body == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ github.ref_name }}"
          # Push to the default branch so the changelog update is not lost.
          git push origin HEAD:refs/heads/main

      - name: Build (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X github.com/mtsfoni/construct/internal/buildinfo.Version=${{ github.ref_name }}" \
            -o dist/construct-linux-amd64 ./cmd/construct

      - name: Build (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X github.com/mtsfoni/construct/internal/buildinfo.Version=${{ github.ref_name }}" \
            -o dist/construct-linux-arm64 ./cmd/construct

      - name: Build (windows/amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X github.com/mtsfoni/construct/internal/buildinfo.Version=${{ github.ref_name }}" \
            -o dist/construct-windows-amd64.exe ./cmd/construct

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: ${{ steps.changelog.outputs.has_body == 'true' && '/tmp/release-body.md' || '' }}
