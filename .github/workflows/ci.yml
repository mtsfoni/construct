name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build (Linux)
        run: GOOS=linux go build ./cmd/construct

      - name: Build (Windows)
        run: GOOS=windows go build ./cmd/construct
